<!DOCTYPE html>
<html lang="{{ current_lang }}" dir="{{ 'rtl' if current_lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>تعديل الملف الشخصي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f3f4f6; font-family: 'Tajawal', sans-serif; min-height: 100vh; }
        .text-gold { color: #d4af37 !important; }
        .glass-card { background: #151515; border: 1px solid #333; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control, .form-check-input { background-color: #222; border: 1px solid #444; color: #fff; }
        .form-control:focus { background-color: #333; border-color: #d4af37; color: #fff; box-shadow: none; }
        .form-check-input:checked { background-color: #d4af37; border-color: #d4af37; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-5 border-bottom border-secondary" style="background: rgba(10,10,10,0.9);">
        <div class="container">
            <a class="navbar-brand fw-bold text-gold" href="{{ url_for('home') }}">منصة نجاحي</a>
            <a href="{{ url_for('profile', username=current_user.username) }}" class="btn btn-outline-light btn-sm rounded-pill px-4">إلغاء والعودة</a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 glass-card">
                <h3 class="fw-bold mb-4 text-center text-gold"><i class="fa-solid fa-pen-to-square me-2"></i>تعديل الملف الشخصي</h3>
                <form action="{{ url_for('edit_profile') }}" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-4 text-center">
                        <label class="form-label text-white-50">الصورة الشخصية</label>
                        <input type="file" name="profile_pic" class="form-control rounded-pill" accept="image/*">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-gold">نبذة عنك (Bio)</label>
                        <textarea name="bio" class="form-control rounded-3" rows="3" placeholder="اكتب شيئاً ملهماً...">{{ current_user.bio or '' }}</textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-white-50">رقم الهاتف</label>
                            <input type="text" name="phone" value="{{ current_user.phone or '' }}" class="form-control rounded-pill">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-white-50">البلد</label>
                            <input type="text" name="country" value="{{ current_user.country or '' }}" class="form-control rounded-pill">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-white-50">المدينة</label>
                            <input type="text" name="city" value="{{ current_user.city or '' }}" class="form-control rounded-pill">
                        </div>
                    </div>

                    <div class="mb-4 p-3 rounded-3" style="background: #222;">
                        <h6 class="text-gold mb-3">خيارات الخصوصية (تظهر للآخرين)</h6>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="show_email" id="show_email" {% if current_user.show_email %}checked{% endif %}>
                            <label class="form-check-label text-white-50" for="show_email">السماح بعرض بريدي الإلكتروني للآخرين</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="show_phone" id="show_phone" {% if current_user.show_phone %}checked{% endif %}>
                            <label class="form-check-label text-white-50" for="show_phone">السماح بعرض رقم هاتفي للآخرين</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 rounded-pill fw-bold" style="background-color: #d4af37; color: #000;">حفظ التعديلات</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
