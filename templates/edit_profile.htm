<!DOCTYPE html>
<html lang="{{ current_lang }}" dir="{{ 'rtl' if current_lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>تعديل الملف الشخصي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-5" style="background: rgba(11,15,25,0.8);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">منصة نجاحي</a>
            <a href="{{ url_for('profile', username=current_user.username) }}" class="btn btn-outline-light btn-sm rounded-pill">إلغاء والعودة</a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 glass-card">
                <h3 class="fw-bold mb-4 text-center text-info">تعديل ملفك الشخصي</h3>
                <form action="{{ url_for('edit_profile') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-4 text-center">
                        <label class="form-label d-block">الصورة الشخصية</label>
                        <input type="file" name="profile_pic" class="form-control bg-dark text-white border-secondary" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">نبذة عنك (Bio)</label>
                        <textarea name="bio" class="form-control bg-dark text-white border-secondary" rows="3" placeholder="اكتب شيئاً يعبر عن شخصيتك وتطلعاتك...">{{ current_user.bio or '' }}</textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="text" name="phone" value="{{ current_user.phone or '' }}" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">البلد</label>
                            <input type="text" name="country" value="{{ current_user.country or '' }}" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">المدينة</label>
                            <input type="text" name="city" value="{{ current_user.city or '' }}" class="form-control bg-dark text-white border-secondary">
                        </div>
                        
                        {% if current_user.occupation_type == 'student' %}
                        <div class="col-md-12">
                            <label class="form-label">الجامعة</label>
                            <input type="text" name="university_name" value="{{ current_user.university_name or '' }}" class="form-control bg-dark text-white border-secondary">
                        </div>
                        {% else %}
                        <div class="col-md-12">
                            <label class="form-label">الشركة / مكان العمل</label>
                            <input type="text" name="company_name" value="{{ current_user.company_name or '' }}" class="form-control bg-dark text-white border-secondary">
                        </div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-info w-100 mt-4 rounded-pill fw-bold">حفظ التعديلات</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
