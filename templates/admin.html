<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f3f4f6; font-family: 'Tajawal', sans-serif; }
        .text-gold { color: #d4af37 !important; }
        .glass-card { background: #151515; border: 1px solid #333; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4 border-bottom border-secondary" style="background: rgba(10,10,10,0.9);">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="#"><i class="fa-solid fa-user-shield me-2"></i>لوحة الإدارة القُصوى</a>
            <a href="{{ url_for('home') }}" class="btn btn-outline-light btn-sm rounded-pill px-4">عودة للموقع</a>
        </div>
    </nav>
    <div class="container">
        <div class="glass-card">
            <h4 class="text-gold mb-4"><i class="fa-solid fa-users me-2"></i>إدارة المستخدمين</h4>
            <div class="table-responsive">
                <table class="table table-dark table-striped align-middle">
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الإيميل</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for u in users %}
                        <tr>
                            <td>{{ u.username }} {% if u.is_admin %}<span class="badge bg-danger">أدمن</span>{% endif %}</td>
                            <td>{{ u.email }}</td>
                            <td>
                                {% if not u.is_admin %}
                                <form action="{{ url_for('admin_delete_user', user_id=u.id) }}" method="POST" onsubmit="return confirm('هل أنت متأكد من حذف هذا المستخدم؟');">
                                    <button type="submit" class="btn btn-danger btn-sm rounded-pill px-3">حذف</button>
                                </form>
                                {% else %}
                                <button class="btn btn-secondary btn-sm rounded-pill px-3" disabled>محمي</button>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
