<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنشئ قصتك الملهمة - منصة مسارات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .navbar { background-color: #1a365d; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .form-container { max-width: 700px; margin: 50px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">منصة مسارات</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link btn btn-outline-light btn-sm px-3" href="{{ url_for('home') }}">العودة للرئيسية</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="text-primary fw-bold text-center mb-4">شارك قصة تحديك ونجاحك</h2>
            <form action="{{ url_for('add_story') }}" method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">عنوان قصتك الملهمة</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="مثال: رحلتي في انتزاع الاستقلال التقني" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label for="challenge" class="form-label fw-bold">مرحلة الصعوبة والتحدي</label>
                    <textarea class="form-control" id="challenge" name="challenge" rows="4" placeholder="صف الصعوبات والقيود التي واجهتك في بدايتك..." required></textarea>
                </div>
                <div class="mb-3">
                    <label for="turning_point" class="form-label fw-bold">نقطة التحول والنجاح</label>
                    <textarea class="form-control" id="turning_point" name="turning_point" rows="4" placeholder="ما القرار أو الحدث الذي غير مسارك تماماً؟" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="outcome" class="form-label fw-bold">النتيجة الحالية والدروس المستفادة</label>
                    <textarea class="form-control" id="outcome" name="outcome" rows="4" placeholder="أين أنت اليوم وما هي نصيحتك للآخرين؟" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">انشر قصتك الآن 🚀</button>
            </form>
        </div>
    </div>

</body>
</html>
